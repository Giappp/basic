spring.application.name=basic
spring.threads.virtual.enabled=true
spring.security.user.roles=USER,ADMIN
spring.datasource.url=${DATA_SOURCE_URL}
spring.datasource.username=${DATA_SOURCE_USERNAME}
spring.datasource.password=${DATA_SOURCE_PASSWORD}
spring.jpa.show-sql=true
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.jackson.deserialization.fail-on-unknown-inject-value=true
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-expiration=${ACCESS_TOKEN_EXPIRATION}
app.security.jwt.refresh-token-expiration=${REFRESH_TOKEN_EXPIRATION}
app.security.cookie.secure=${COOKIE_SECURE}
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=trace
logging.file.name=basic.log
logging.level.root=WARN
logging.level.org.springframework.web=DEBUG
spring.messages.always-use-message-format=false
spring.messages.basename=messages
spring.messages.cache-duration=
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=true
spring.messages.use-code-as-default-message=false